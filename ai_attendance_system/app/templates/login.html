<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#060610">
    <title>Login | SmartAttend</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-page { min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px; }
        .login-card {
            background:var(--glass-bg,rgba(10,11,25,0.85));
            backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
            border:1px solid var(--glass-border);border-radius:24px;
            padding:40px 36px;width:100%;max-width:430px;
            box-shadow:0 40px 100px rgba(0,0,0,0.5),0 0 60px rgba(0,245,255,0.04);
            animation:fadeInUp .45s ease both;
        }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .login-brand { display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:28px; }
        .login-brand-icon {
            width:52px;height:52px;border-radius:14px;
            background:linear-gradient(135deg,rgba(0,245,255,.15),rgba(139,92,246,.15));
            border:1px solid rgba(0,245,255,.3);
            display:flex;align-items:center;justify-content:center;
            box-shadow:0 0 24px rgba(0,245,255,.12);
        }
        .login-brand-icon svg { width:26px;height:26px;stroke:var(--cyan); }
        .login-brand-name { font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;color:var(--text-primary); }
        /* Tab switcher */
        .tab-switcher { display:flex;gap:6px;background:rgba(255,255,255,.05);padding:5px;border-radius:12px;margin-bottom:28px; }
        .tab-btn {
            flex:1;padding:9px;border:none;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;
            background:transparent;color:var(--text-muted);transition:all .2s;letter-spacing:.02em;
        }
        .tab-btn.active { background:rgba(0,245,255,.12);color:var(--cyan);border:1px solid rgba(0,245,255,.25); }
        /* Tab panels */
        .tab-panel { display:none; } .tab-panel.active { display:block; }
        .login-input {
            width:100%;background:rgba(255,255,255,.04);border:1.5px solid var(--glass-border);
            border-radius:12px;color:var(--text-primary);font-size:14px;padding:13px 16px;
            outline:none;transition:all .2s;font-family:'Inter',sans-serif;margin-bottom:14px;
        }
        .login-input:focus { border-color:rgba(0,245,255,.6);box-shadow:0 0 0 3px rgba(0,245,255,.1);background:rgba(0,245,255,.04); }
        .input-label { font-size:12px;color:var(--text-muted);font-weight:500;margin-bottom:5px;display:block; }
        .error-msg { background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;
            color:#f87171;font-size:13px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:8px; }
        .login-footer { text-align:center;margin-top:20px;color:var(--text-muted);font-size:12px; }
    </style>
</head>
<body>
<div class="bg-mesh">
    <div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div>
</div>
<div class="login-page">
    <div class="login-card">
        <!-- Brand -->
        <div class="login-brand">
            <div class="login-brand-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <div class="login-brand-name">SmartAttend</div>
        </div>

        <!-- Tab switcher -->
        <div class="tab-switcher">
            <button class="tab-btn {% if active_tab=='admin' %}active{% endif %}"
                    onclick="switchTab('admin')" type="button" id="tabAdmin">
                🔐 Admin
            </button>
            <button class="tab-btn {% if active_tab=='student' %}active{% endif %}"
                    onclick="switchTab('student')" type="button" id="tabStudent">
                🎓 Student
            </button>
        </div>

        <!-- Admin Panel -->
        <div class="tab-panel {% if active_tab=='admin' %}active{% endif %}" id="panelAdmin">
            {% if admin_error %}
            <div class="error-msg">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                {{ admin_error }}
            </div>
            {% endif %}
            <form method="POST">
                <input type="hidden" name="role" value="admin">
                <label class="input-label">Admin PIN</label>
                <input type="password" name="pin" class="login-input" placeholder="Enter your admin PIN"
                       autocomplete="current-password" {% if active_tab=='admin' %}autofocus{% endif %}>
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;font-size:14px;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                    Sign In as Admin
                </button>
            </form>
            <div style="margin-top:12px;font-size:11px;color:var(--text-muted);text-align:center;">
                Full access: attendance, reports, student management
            </div>
        </div>

        <!-- Student Panel -->
        <div class="tab-panel {% if active_tab=='student' %}active{% endif %}" id="panelStudent">
            {% if student_error %}
            <div class="error-msg">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                {{ student_error }}
            </div>
            {% endif %}
            <form method="POST">
                <input type="hidden" name="role" value="student">
                <label class="input-label">Roll Number</label>
                <input type="text" name="roll_no" class="login-input" placeholder="e.g. CS2021001"
                       autocomplete="username" {% if active_tab=='student' %}autofocus{% endif %}>
                <label class="input-label">PIN</label>
                <input type="password" name="student_pin" class="login-input" placeholder="Your PIN (default: your roll number)"
                       autocomplete="current-password">
                <button type="submit" class="btn btn-success" style="width:100%;justify-content:center;padding:13px;font-size:14px;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Sign In as Student
                </button>
            </form>
            <div style="margin-top:12px;font-size:11px;color:var(--text-muted);text-align:center;">
                View your attendance &amp; edit your profile
            </div>
        </div>

        <div class="login-footer" style="display:flex;align-items:center;justify-content:center;gap:8px;">
            SmartAttend Neural Tracker &nbsp;&middot;&nbsp; 
            <span style="font-family:'Outfit',sans-serif; font-weight:700; letter-spacing:0.1em; color:var(--text-secondary); text-transform:uppercase; display:inline-flex; align-items:center; gap:6px;">
                <span style="width:4px;height:4px;border-radius:50%;background:var(--cyan);box-shadow:0 0 6px var(--cyan);"></span>
                Made By Rishi
            </span>
        </div>
    </div>
</div>
<script>
function switchTab(tab) {
    document.getElementById('panelAdmin').classList.toggle('active',   tab === 'admin');
    document.getElementById('panelStudent').classList.toggle('active', tab === 'student');
    document.getElementById('tabAdmin').classList.toggle('active',   tab === 'admin');
    document.getElementById('tabStudent').classList.toggle('active', tab === 'student');
}
</script>
</body>
</html>
